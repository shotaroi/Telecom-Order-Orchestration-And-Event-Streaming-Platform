events {
    worker_connections 1024;
}

http {
    # Rate limiting zone: 10 req/s per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Upstreams - use host.docker.internal when nginx runs in Docker, apps run on host
    upstream order_api {
        server host.docker.internal:8081;
    }

    upstream support_search {
        server host.docker.internal:8084;
    }

    server {
        listen 80;
        server_name localhost;

        # Forward correlation ID
        proxy_set_header X-Correlation-Id $http_x_correlation_id;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        # /api/orders -> order-api
        location /api/orders {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://order_api;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }

        # /support -> support-search-service
        location /support {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://support_search;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }

        # Health check
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}
